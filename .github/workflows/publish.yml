name: Publish Extension

on:
  release:
    types: [published]

permissions: {}

jobs:
  # Preenche o corpo da release publicada a partir do CHANGELOG.md (seção da
  # versão) + o bloco "New Contributors"/"Full Changelog" que o GitHub computa.
  # Roda uma vez (sem matriz), independente do build dos VSIX.
  release-notes:
    name: Fill release notes
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Build and apply release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"

          # 1. Seção curada do CHANGELOG.md (cabeçalho "## [VERSÃO] - data").
          # Apara linhas em branco e o separador "---" do fim da seção.
          BODY=$(awk "/^## \[?v?${VERSION}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md \
            | awk '{lines[NR]=$0} END{n=NR; while(n>0 && (lines[n] ~ /^[[:space:]]*$/ || lines[n] ~ /^---[[:space:]]*$/)) n--; for(i=1;i<=n;i++) print lines[i]}')
          if [ -z "$BODY" ]; then
            BODY="Consulte o [CHANGELOG.md](CHANGELOG.md) para detalhes."
          fi

          # 2. Notas automáticas — usadas só para o bloco "New Contributors" e o
          # link "Full Changelog"; a categorização auto é descartada (o CHANGELOG
          # já faz isso com mais contexto).
          AUTO=$(gh api -X POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$TAG" -q .body 2>/dev/null || echo "")
          APPENDIX=$(echo "$AUTO" | sed -n '/^## New Contributors$/,$p')
          if [ -z "$APPENDIX" ]; then
            APPENDIX=$(echo "$AUTO" | grep '^\*\*Full Changelog\*\*' | tail -1)
          fi

          {
            echo "$BODY"
            if [ -n "$APPENDIX" ]; then
              printf '\n---\n\n%s\n' "$APPENDIX"
            fi
          } > release_body.md

          cat release_body.md
          gh release edit "$TAG" --notes-file release_body.md

  publish:
    name: Publish ${{ matrix.vsce_target }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - vsce_target: linux-x64
            engine_artifact: pawnpro-engine-linux-x64
          - vsce_target: linux-arm64
            engine_artifact: pawnpro-engine-linux-arm64
          - vsce_target: win32-x64
            engine_artifact: pawnpro-engine-win32-x64.exe
          - vsce_target: darwin-x64
            engine_artifact: pawnpro-engine-darwin-x64
          - vsce_target: darwin-arm64
            engine_artifact: pawnpro-engine-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download engine binary
        run: node scripts/download-engine.js --artifact ${{ matrix.engine_artifact }}
        env:
          CI: 'true'

      - name: Type check
        run: npm run compile

      # vsce package chama npm run vscode:prepublish (= npm run bundle) automaticamente
      - name: Package (pre-release)
        if: github.event.release.prerelease == true
        run: npx @vscode/vsce package --target ${{ matrix.vsce_target }} --pre-release --no-dependencies --no-yarn && node scripts/repack-vsix.js

      - name: Package (release)
        if: github.event.release.prerelease == false
        run: npx @vscode/vsce package --target ${{ matrix.vsce_target }} --no-dependencies --no-yarn && node scripts/repack-vsix.js

      - name: Find VSIX
        id: vsix
        run: echo "file=$(ls *.vsix | head -1)" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: ${{ steps.vsix.outputs.file }}

      - name: Publish to VS Code Marketplace
        run: |
          FLAGS=""
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            FLAGS="--pre-release"
          fi
          npx @vscode/vsce publish --packagePath "${{ steps.vsix.outputs.file }}" $FLAGS
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: |
          FLAGS=""
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            FLAGS="--pre-release"
          fi
          npx ovsx publish "${{ steps.vsix.outputs.file }}" $FLAGS
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
