name: Security and Build Checks

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Type Check, Bundle & Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run compile

      - name: Bundle (minified)
        run: npm run bundle

      - name: Audit production dependencies
        run: npm audit --audit-level=moderate --omit=dev
