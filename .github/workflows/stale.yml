name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '19 0 * * *'

permissions: {}

jobs:
  stale:
    name: Stale
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9.1.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: |
            Olá! 👋

            Esta issue está sem atividade há algum tempo, por isso foi marcada como inativa.
            Se ainda fizer sentido, comente ou atualize a issue para que ela continue aberta.

            Caso não haja novas interações, ela poderá ser fechada automaticamente.
          stale-pr-message: |
            Olá! 👋

            Este pull request está sem atividade há algum tempo, por isso foi marcado como inativo.
            Se ainda estiver em andamento, por favor envie novas atualizações ou deixe um comentário.

            Caso não haja novas interações, ele poderá ser fechado automaticamente.
          stale-issue-label: 'sem-atividade-issue'
          stale-pr-label: 'sem-atividade-pr'
